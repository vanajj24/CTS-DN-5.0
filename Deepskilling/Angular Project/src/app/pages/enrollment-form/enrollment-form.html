<div class="form-container animate-fade-in">
  <h2>Enrollment Request (Template-Driven)</h2>
  
  <div *ngIf="submitted" class="success-message">
    <p>Enrollment request submitted successfully!</p>
    <button (click)="resetForm()">Submit Another</button>
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" *ngIf="!submitted" class="enroll-form">
    
    <div class="form-group">
      <label for="studentName">Student Name</label>
      <input type="text" id="studentName" name="studentName" [(ngModel)]="studentName" required minlength="3" #nameCtrl="ngModel">
      <span class="error-message" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">Name is required</span>
      <span class="error-message" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">Name must be at least 3 characters</span>
    </div>

    <div class="form-group">
      <label for="studentEmail">Email</label>
      <input type="email" id="studentEmail" name="studentEmail" [(ngModel)]="studentEmail" required email #emailCtrl="ngModel">
      <span class="error-message" *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">Email is required</span>
      <span class="error-message" *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">Must be a valid email</span>
    </div>

    <div class="form-group">
      <label for="courseId">Course ID</label>
      <input type="number" id="courseId" name="courseId" [(ngModel)]="courseId" required #courseCtrl="ngModel">
      <span class="error-message" *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">Course ID is required</span>
    </div>

    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" name="preferredSemester" [(ngModel)]="preferredSemester">
        <option value="Odd">Odd Semester</option>
        <option value="Even">Even Semester</option>
      </select>
    </div>

    <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" name="agreeToTerms" [(ngModel)]="agreeToTerms" required>
        I agree to the terms and conditions
      </label>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="enrollForm.resetForm()">Reset</button>
      <button type="submit" [disabled]="enrollForm.invalid">Submit Request</button>
    </div>
  </form>
</div>
